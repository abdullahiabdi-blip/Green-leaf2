    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg">

            <a class="navbar-brand" href="index.html">

    <section class="shop py-5">

            <h1 class="text-center mb-4">Our Plants</h1>
            <div class="row g-4" id="plant-grid">
                <div class="col-md-3 col-sm-6">
    <div class="card plant-card">

        <div class="card-body">
            <h5 class="card-title">Monstera</h5>
            <p class="card-text">$35</p>
            <button class="btn btn-outline-primary btn-sm wishlist-btn" data-plant="Monstera">
                <i class="far fa-heart"></i> Wishlist
            </button>
        </div>
    </div>
</div>

<div class="col-md-3 col-sm-6">
    <div class="card plant-card">
        <img src="images/snake-plant.jpg" class="card-img-top" alt="Snake Plant">
        <div class="card-body">
            <h5 class="card-title">Snake Plant</h5>
            <p class="card-text">$25</p>
            <button class="btn btn-outline-primary btn-sm wishlist-btn" data-plant="Snake Plant">
                <i class="far fa-heart"></i> Wishlist
            </button>
        </div>
    </div>
</div>

<div class="col-md-3 col-sm-6">
    <div class="card plant-card">
        <img src="images/pothos.jpg" class="card-img-top" alt="Pothos">
        <div class="card-body">
            <h5 class="card-title">Pothos</h5>
            <p class="card-text">$15</p>
            <button class="btn btn-outline-primary btn-sm wishlist-btn" data-plant="Pothos">
                <i class="far fa-heart"></i> Wishlist
            </button>
        </div>
    </div>
</div>

<div class="col-md-3 col-sm-6">
    <div class="card plant-card">
       <img src="images/fiddle-leaf.jpg" class="card-img-top" alt="Fiddle Leaf Fig">
        <div class="card-body">
            <h5 class="card-title">Fiddle Leaf Fig</h5>
            <p class="card-text">$45</p>
            <button class="btn btn-outline-primary btn-sm wishlist-btn" data-plant="Fiddle Leaf Fig">
                <i class="far fa-heart"></i> Wishlist
            </button>
        </div>
    </div>
</div>

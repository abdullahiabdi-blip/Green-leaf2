<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenLeaf | Wishlist</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== NAVIGATION ===== -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-leaf"></i> GreenLeaf</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="plant-care.html">Plant Care</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link active" href="wishlist.html"><i class="fas fa-heart"></i> Wishlist</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ===== WISHLIST DISPLAY ===== -->
    <section class="wishlist py-5">
        <div class="container">
            <h1 class="text-center mb-4">My Wishlist</h1>
            <div id="wishlist-container" class="row g-4"></div>
            <div id="empty-wishlist" class="text-center py-5">
                <i class="fas fa-heart fa-3x text-muted"></i>
                <p class="mt-3">Your wishlist is empty. Start adding plants you love!</p>
                <a href="shop.html" class="btn btn-primary">Browse Plants</a>
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer>
        <div class="container">
            <p>&copy; 2026-2027 GreenLeaf. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ===== WISHLIST LOGIC ===== -->
    <script>
        // Plant catalog
        var allPlants = [
            { name: "Monstera", price: "KES 4,550", img: "images/monstera.jpg" },
            { name: "Snake Plant", price: "KES 2,999", img: "images/snake-plant.jpg" },
            { name: "Pothos", price: "KES 1,499", img: "images/pothos.jpg" },
            { name: "Fiddle Leaf Fig", price: "KES 5,850", img: "images/fiddle-leaf.jpg" },
            { name: "Spider Plant", price: "KES 2,600", img: "images/spider-plant.jpg" },
            { name: "ZZ Plant", price: "KES 3,900", img: "images/zz-plant.jpg" },
            { name: "Aloe Vera", price: "KES 2,860", img: "images/aloe-vera.jpg" },
            { name: "String of Pearls", price: "KES 3,640", img: "images/string-of-pearls.jpg" },
            { name: "Calathea", price: "KES 4,160", img: "images/calathea.jpg" }
        ];

        // Load saved wishlist
        var wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

        // Display saved plants
        function displayWishlist() {
            var container = document.getElementById('wishlist-container');
            var emptyMsg = document.getElementById('empty-wishlist');
            if (!container) return;

            if (wishlist.length === 0) {
                container.innerHTML = '';
                if (emptyMsg) emptyMsg.style.display = 'block';
                return;
            }
            if (emptyMsg) emptyMsg.style.display = 'none';

            var html = '';
            allPlants.forEach(function(plant) {
                if (wishlist.includes(plant.name)) {
                    html += `
                        <div class="col-md-4 col-sm-6">
                            <div class="card plant-card">
                                <img src="${plant.img}" class="card-img-top" alt="${plant.name}">
                                <div class="card-body">
                                    <h5 class="card-title">${plant.name}</h5>
                                    <p class="card-text">${plant.price}</p>
                                    <button class="btn btn-danger btn-sm remove-btn" data-plant="${plant.name}">
                                        <i class="fas fa-trash"></i> Remove
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
            container.innerHTML = html;

            // Remove button handlers
            document.querySelectorAll('.remove-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var plantName = this.getAttribute('data-plant');
                    var index = wishlist.indexOf(plantName);
                    if (index !== -1) {
                        wishlist.splice(index, 1);
                        localStorage.setItem('wishlist', JSON.stringify(wishlist));
                        displayWishlist();
                    }
                });
            });
        }

        // Initialize
        displayWishlist();
    </script>
</body>
</html>
